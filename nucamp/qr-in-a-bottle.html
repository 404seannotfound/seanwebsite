<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message in a Bottle | Captain's Rig</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@300;500&family=Dancing+Script:wght@600&display=swap');
        :root { --gold: #d4af37; --sea-deep: #020617; --parchment: #f4ece1; }
        body { background-color: var(--sea-deep); color: white; font-family: 'Quicksand', sans-serif; overflow-x: hidden; min-height: 100vh; }
        .cinzel { font-family: 'Cinzel', serif; }
        .script { font-family: 'Dancing Script', cursive; }

        .ocean { height: 15%; width: 100%; position: absolute; bottom: 0; left: 0; background: #1e293b; opacity: 0.2; z-index: 0; }
        .wave { background: url(https://s3-us-west-2.amazonaws.com/s.cdpn.io/85486/wave.svg) repeat-x; position: absolute; top: -198px; width: 6400px; height: 198px; animation: wave 15s linear infinite; }
        @keyframes wave { 0% { margin-left: 0; } 100% { margin-left: -1600px; } }

        @media (max-width: 1024px) {
            .bottle-frame { width: 180px !important; height: 300px !important; border-radius: 90px 90px 30px 30px !important; }
            .qr-area { width: 140px !important; height: 140px !important; }
        }
        .bottle-frame {
            position: relative; width: 260px; height: 420px;
            background: rgba(255, 255, 255, 0.05); border-radius: 130px 130px 40px 40px;
            backdrop-filter: blur(15px); border: 2px solid rgba(255, 255, 255, 0.1);
            animation: float 5s ease-in-out infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; z-index: 10;
        }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-15px) rotate(1.5deg); } }

        .qr-area { background: white; padding: 12px; border-radius: 4px; width: 210px; height: 210px; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .sonar { position: absolute; inset: 0; border: 4px solid var(--gold); border-radius: 4px; animation: sonar-pulse 0.6s ease-out infinite; opacity: 0; pointer-events: none; }
        @keyframes sonar-pulse { 0% { transform: scale(0.9); opacity: 1; } 100% { transform: scale(1.1); opacity: 0; } }

        .glass-ui { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        .btn-action:not(:disabled) { background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); color: black; font-weight: bold; opacity: 1 !important; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .btn-secondary:not(:disabled) { border: 1px solid var(--gold); color: var(--gold); opacity: 1 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="ocean"><div class="wave"></div></div>

    <div class="max-w-7xl mx-auto relative z-10">
        <header class="text-center mb-8">
            <h1 class="cinzel text-2xl md:text-4xl text-gold tracking-widest mb-1">MESSAGE IN A BOTTLE</h1>
            <p id="status" class="text-gray-500 text-[10px] tracking-[0.4em] uppercase">Vessel Status: Waiting</p>
        </header>

        <div class="grid lg:grid-cols-3 gap-6">

            <section class="glass-ui p-6 rounded-3xl flex flex-col space-y-6 order-3 lg:order-1">
                <div>
                    <h2 class="cinzel text-xs text-gold mb-4 uppercase tracking-widest">Scanner</h2>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="document.getElementById('file-loader').click()" class="bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest border border-white/5 hover:bg-white/10 flex items-center justify-center gap-2">
                            <i data-lucide="upload" class="w-3 h-3"></i> Load Image
                        </button>
                        <input type="file" id="file-loader" class="hidden" accept="image/*" onchange="loadFromFile(event)">
                        <button onclick="scanClipboard()" class="bg-white/5 py-4 rounded-xl text-[10px] font-bold uppercase tracking-widest border border-white/5 hover:bg-white/10 flex items-center justify-center gap-2">
                            <i data-lucide="clipboard" class="w-3 h-3"></i> From Clipboard
                        </button>
                    </div>
                </div>
                <div class="flex-1 flex flex-col h-[300px]">
                    <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                        <h2 class="cinzel text-[10px] text-gray-500 uppercase">Logbook</h2>
                        <button onclick="clearLog()" class="text-[9px] uppercase tracking-widest text-gray-600 hover:text-red-400">Clear</button>
                    </div>
                    <div id="log-list" class="flex-1 overflow-y-auto space-y-2 pr-2"></div>
                </div>
            </section>

            <section class="glass-ui p-6 rounded-3xl flex flex-col shadow-2xl space-y-4 order-1 lg:order-2">
                <div class="flex justify-between items-center">
                    <h2 class="cinzel text-lg text-gold uppercase tracking-wider">The Scribe</h2>
                    <div class="text-[10px] text-gray-500 font-mono tracking-widest"><span id="count">0</span> / 1200</div>
                </div>
                <textarea id="scribe-input" placeholder="Type your secret... it updates live." 
                    class="flex-1 min-h-[180px] lg:min-h-[400px] bg-black/40 border border-white/10 rounded-2xl p-4 lg:p-6 text-sm text-white focus:outline-none focus:border-gold transition-all resize-none"
                    maxlength="1200"></textarea>
                <div class="flex justify-end">
                    <button onclick="clearAll()" class="text-[9px] uppercase tracking-widest text-gray-600 hover:text-red-400">Scuttle Ship</button>
                </div>
            </section>

            <section class="flex flex-col items-center justify-start py-6 order-2 lg:order-3">
                <div class="bottle-frame">
                    <div class="absolute top-[-35px] w-[50px] h-[50px] border-2 border-white/10 border-b-0 rounded-t-lg"></div>
                    <div id="qr-target" class="qr-area opacity-10">
                        <div id="pulse" class="sonar hidden"></div>
                        <i data-lucide="anchor" id="anchor" class="text-gray-300 w-12 h-12 opacity-20"></i>
                    </div>
                    <div class="mt-8 text-center">
                        <p id="label" class="script text-3xl text-gold opacity-40 italic">Empty Vessel</p>
                    </div>
                </div>
                
                <div class="w-full max-w-sm mt-8 space-y-3">
                    <button id="send-btn" disabled onclick="handleAction('send')" class="w-full py-5 rounded-xl btn-action text-[10px] tracking-[0.2em] uppercase opacity-20 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="send" class="w-4 h-4"></i> Send Bottle
                    </button>
                    <button id="save-btn" disabled onclick="handleAction('save')" class="w-full py-4 rounded-xl btn-secondary text-[10px] tracking-[0.2em] uppercase opacity-20 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Save Bottle
                    </button>
                </div>
            </section>
        </div>
    </div>

    <div id="reveal-overlay" class="fixed inset-0 bg-black/95 hidden z-50 flex items-center justify-center p-6">
        <div class="bg-[#f4ece1] text-gray-900 p-10 rounded shadow-2xl max-w-2xl w-full max-h-[85vh] overflow-y-auto relative border-l-[15px] border-r-[15px] border-[#d4c4ad] transform scale-y-0 transition-transform duration-500" id="scroll-el">
            <button onclick="closeReveal()" class="absolute top-4 right-4 text-gray-400 hover:text-black"><i data-lucide="x-circle"></i></button>
            <h2 class="cinzel text-xl border-b border-gray-300 pb-4 mb-6">A Secret Uncovered</h2>
            <p id="reveal-text" class="script text-4xl leading-relaxed whitespace-pre-wrap"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const scribe = document.getElementById('scribe-input');
        const target = document.getElementById('qr-target');
        const pulse = document.getElementById('pulse');
        const sendBtn = document.getElementById('send-btn');
        const saveBtn = document.getElementById('save-btn');
        const statusText = document.getElementById('status');
        const bottleLabel = document.getElementById('label');

        scribe.addEventListener('input', () => {
            const val = scribe.value;
            document.getElementById('count').textContent = val.length;
            if (val.length > 0) {
                pulse.classList.remove('hidden');
                statusText.textContent = "Status: Forging...";
                forge(val);
            } else {
                reset();
            }
        });

        function forge(text) {
            const qr = qrcode(0, 'Q');
            qr.addData(text);
            qr.make();
            target.innerHTML = qr.createSvgTag(6, 6); 
            target.classList.remove('opacity-10');
            target.querySelector('svg').style.width = "100%";
            target.querySelector('svg').style.height = "100%";
            target.appendChild(pulse);
            
            setTimeout(() => {
                pulse.classList.add('hidden');
                statusText.textContent = "Status: Sealed & Ready";
                bottleLabel.textContent = "Sealed Message";
                bottleLabel.classList.remove('opacity-40');
                sendBtn.disabled = false;
                saveBtn.disabled = false;
            }, 150);
        }

        function reset() {
            target.innerHTML = ''; target.appendChild(pulse); target.appendChild(document.getElementById('anchor'));
            target.classList.add('opacity-10');
            sendBtn.disabled = true;
            saveBtn.disabled = true;
            statusText.textContent = "Status: Waiting";
            bottleLabel.textContent = "Empty Vessel";
            bottleLabel.classList.add('opacity-40');
        }

        function clearAll() { scribe.value = ''; reset(); document.getElementById('count').textContent = '0'; }

        async function handleAction(type) {
            const svg = target.querySelector('svg');
            const canvas = document.createElement('canvas');
            canvas.width = 600; canvas.height = 800;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#f4ece1'; ctx.fillRect(0,0,600,800);
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 15; ctx.strokeRect(20,20,560,760);
            ctx.fillStyle = '#2d241e'; ctx.font = 'bold 36px Cinzel'; ctx.textAlign = 'center';
            ctx.fillText('MESSAGE IN A BOTTLE', 300, 100);
            
            const svgData = new XMLSerializer().serializeToString(svg);
            const img = new Image();
            img.onload = async () => {
                ctx.drawImage(img, 100, 180, 400, 400);
                canvas.toBlob(async (blob) => {
                    if (type === 'send') {
                        if (navigator.share) {
                            const file = new File([blob], 'bottle.png', { type: 'image/png' });
                            await navigator.share({ files: [file], title: 'Secret Bottle' });
                        } else {
                            const item = new ClipboardItem({ "image/png": blob });
                            navigator.clipboard.write([item]);
                            alert("Bottle copied to clipboard!");
                        }
                    } else if (type === 'save') {
                        const link = document.createElement('a');
                        link.download = `secret_bottle_${Date.now()}.png`;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                    }
                });
            };
            img.src = 'data:image/svg+xml;base64,' + btoa(svgData);
        }

        // SCANNING LOGIC
        function scanImageForQR(img) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const MAX = 1024;
            const scale = Math.min(1, MAX / Math.max(img.width, img.height));
            const w = Math.round(img.width * scale);
            const h = Math.round(img.height * scale);

            // Camera photos often have EXIF rotation that canvas ignores — try all 4 orientations
            for (const deg of [0, 90, 180, 270]) {
                const swap = deg === 90 || deg === 270;
                canvas.width  = swap ? h : w;
                canvas.height = swap ? w : h;
                ctx.save();
                ctx.translate(canvas.width / 2, canvas.height / 2);
                ctx.rotate(deg * Math.PI / 180);
                ctx.drawImage(img, -w / 2, -h / 2, w, h);
                ctx.restore();
                const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height);
                if (code) return code.data;
            }
            return null;
        }

        function loadFromFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const result = scanImageForQR(img);
                    if (result) showReveal(result); else alert("No secret found.");
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function scanClipboard() {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    const imageType = item.types.find(t => t.startsWith('image/'));
                    if (imageType) {
                        const blob = await item.getType(imageType);
                        const url = URL.createObjectURL(blob);
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width; canvas.height = img.height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0);
                            const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, img.width, img.height);
                            URL.revokeObjectURL(url);
                            if (code) showReveal(code.data);
                            else alert("No secret found in clipboard image.");
                        };
                        img.src = url;
                        return;
                    }
                }
                alert("No image found in clipboard.");
            } catch(e) { alert("Could not read clipboard image."); }
        }

        function showReveal(text) {
            const log = JSON.parse(localStorage.getItem('b_log_final') || '[]');
            log.unshift({ id: Date.now(), text, time: new Date().toLocaleTimeString() });
            localStorage.setItem('b_log_final', JSON.stringify(log));
            renderLog();
            document.getElementById('reveal-text').textContent = text;
            const overlay = document.getElementById('reveal-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            setTimeout(() => document.getElementById('scroll-el').style.transform = 'scaleY(1)', 50);
        }

        function closeReveal() {
            document.getElementById('scroll-el').style.transform = 'scaleY(0)';
            setTimeout(() => {
                const overlay = document.getElementById('reveal-overlay');
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }, 500);
        }

        function clearLog() { localStorage.removeItem('b_log_final'); renderLog(); }

        function populateFromLog(text) {
            scribe.value = text;
            scribe.dispatchEvent(new Event('input'));
        }

        function renderLog() {
            const log = JSON.parse(localStorage.getItem('b_log_final') || '[]');
            const container = document.getElementById('log-list');
            container.innerHTML = '';
            log.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-white/5 rounded-lg border border-white/5 text-[10px] hover:bg-white/10 flex items-center gap-2';

                const btn = document.createElement('button');
                btn.textContent = '→';
                btn.className = 'text-gray-600 hover:text-gold shrink-0';
                btn.title = 'Load into scribe';
                btn.onclick = () => populateFromLog(item.text);

                const info = document.createElement('div');
                info.className = 'min-w-0 flex-1 cursor-pointer';
                info.onclick = () => showReveal(item.text);
                info.innerHTML = `<div class="text-gold opacity-50 mb-1 font-mono">${item.time}</div><div class="truncate italic opacity-80">"${item.text}"</div>`;

                div.appendChild(btn);
                div.appendChild(info);
                container.appendChild(div);
            });
        }
        renderLog();
    </script>
</body>
</html>
